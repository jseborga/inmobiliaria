services:
  postgres:
    # Postgres 16 + PostGIS 3.4 + pgvector preinstalados.
    # PostGIS lo necesita la búsqueda geoespacial (columna `location`).
    # pgvector lo necesita el RAG semántico (columna `properties.embedding`).
    # La imagen es la misma que usa docker-compose.prod.yml para evitar
    # diferencias de extensiones entre dev y prod.
    image: garapadev/postgres-postgis-pgvector:16-stable
    container_name: inmobiliaria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inmobiliaria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inmobiliaria_dev}
      POSTGRES_DB: ${POSTGRES_DB:-inmobiliaria}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inmobiliaria} -d ${POSTGRES_DB:-inmobiliaria}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: inmobiliaria-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
