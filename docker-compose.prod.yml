# Compose para deploy productivo (Easypanel, VPS con docker, etc.).
#
# - Postgres con PostGIS (la app crea la extensión vía migración).
# - Redis (sin auth en red interna; cambiar si exponés el puerto).
# - API NestJS, web Next.js.
#
# En Easypanel:
#   - Importá este archivo desde "Compose" o crea servicios individuales.
#   - El proxy de Easypanel termina TLS y rutea por dominio. Conectá:
#       api.tu-dominio.com   -> service api  (puerto 3001)
#       app.tu-dominio.com   -> service web  (puerto 3000)
#       *.tu-dominio.com     -> service web  (puerto 3000)
#   - Para los secrets ver .env.prod.example.
#
# Local prod-like:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Para correr el seed del super-admin la primera vez:
#   docker compose -f docker-compose.prod.yml exec api \
#     node ../../node_modules/prisma/build/index.js db seed --schema=./prisma/schema.prisma
#
# Nota: TODOS los valores con `${...}` van entre comillas dobles. Sin las
# comillas, el `:` dentro de URLs (`https://...`, `postgresql://...`) o
# dentro de mensajes de error (`:?...`) confunde al parser YAML estricto
# de algunas plataformas (ej. Easypanel) y rechaza el archivo.

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-inmobiliaria}"
      POSTGRES_USER: "${POSTGRES_USER:-inmobiliaria}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: "production"
      PORT: "3001"
      API_PREFIX: "api"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-inmobiliaria}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-inmobiliaria}?schema=public"
      REDIS_URL: "redis://redis:6379"
      CORS_ORIGINS: "${CORS_ORIGINS:?CORS_ORIGINS requerido}"
      ROOT_DOMAIN: "${ROOT_DOMAIN:?ROOT_DOMAIN requerido}"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET requerido}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET requerido}"
      JWT_ACCESS_TTL: "${JWT_ACCESS_TTL:-15m}"
      JWT_REFRESH_TTL: "${JWT_REFRESH_TTL:-7d}"
      SUPER_ADMIN_EMAIL: "${SUPER_ADMIN_EMAIL:-admin@miapp.test}"
      SUPER_ADMIN_PASSWORD: "${SUPER_ADMIN_PASSWORD:?SUPER_ADMIN_PASSWORD requerido}"
      SUPER_ADMIN_FIRST_NAME: "${SUPER_ADMIN_FIRST_NAME:-Platform}"
      SUPER_ADMIN_LAST_NAME: "${SUPER_ADMIN_LAST_NAME:-Admin}"
      # R2 (Cloudflare) — vacío usa mock storage en disco (volume).
      R2_ACCOUNT_ID: "${R2_ACCOUNT_ID:-}"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID:-}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY:-}"
      R2_BUCKET: "${R2_BUCKET:-}"
      R2_PUBLIC_URL: "${R2_PUBLIC_URL:-}"
      # URL pública del API. CRÍTICO si usás mock storage (sin R2): es la URL
      # a la que el browser hace PUT para subir imágenes. Sin esto, el mock
      # devuelve URLs `localhost:3001` que el browser nunca alcanza.
      API_PUBLIC_URL: "${API_PUBLIC_URL:-${NEXT_PUBLIC_API_URL}}"
      # Seeds opcionales en boot (idempotentes):
      #   RUN_SEED_ON_BOOT=1      → crea super-admin de plataforma.
      #   RUN_DEMO_SEED_ON_BOOT=1 → crea tenant `demo` + OWNER + 8 propiedades.
      RUN_SEED_ON_BOOT: "${RUN_SEED_ON_BOOT:-0}"
      RUN_DEMO_SEED_ON_BOOT: "${RUN_DEMO_SEED_ON_BOOT:-0}"
      DEMO_TENANT_SLUG: "${DEMO_TENANT_SLUG:-demo}"
      DEMO_OWNER_EMAIL: "${DEMO_OWNER_EMAIL:-demo@inmobiliaria.test}"
      DEMO_OWNER_PASSWORD: "${DEMO_OWNER_PASSWORD:-DemoOwner12345!}"
    volumes:
      # Persistir uploads cuando se usa el mock storage (sin R2).
      - api_uploads:/repo/apps/api/storage/uploads
    ports:
      - "${API_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Estos NEXT_PUBLIC_* se inlinean en el bundle del cliente y por eso
        # se pasan en build (no en runtime). Si cambian, hay que rebuildear.
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL requerido}"
        NEXT_PUBLIC_ROOT_DOMAIN: "${NEXT_PUBLIC_ROOT_DOMAIN:?NEXT_PUBLIC_ROOT_DOMAIN requerido}"
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
      NEXT_PUBLIC_ROOT_DOMAIN: "${NEXT_PUBLIC_ROOT_DOMAIN}"
      # Server-side fetch del web → API por la red interna del compose.
      # Si querés overridear (ej. otra red), exportá INTERNAL_API_URL.
      INTERNAL_API_URL: "${INTERNAL_API_URL:-http://api:3001/api}"
      WEB_SESSION_SECRET: "${WEB_SESSION_SECRET:?WEB_SESSION_SECRET requerido}"
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  api_uploads:
