name: Build & Publish Images

# Buildea y publica imágenes Docker de api/web a GHCR.
# El runner pre-buildea con cache de layers (gha backend) y el host de
# deploy (Easypanel/VPS) hace `docker pull` en lugar de `docker build`,
# eliminando ~minutos de compilación de cada deploy.
#
# Tags publicados:
#   - ghcr.io/<owner>/inmobiliaria-api:<sha>      siempre
#   - ghcr.io/<owner>/inmobiliaria-api:main       en push a main
#   - ghcr.io/<owner>/inmobiliaria-api:vX.Y.Z     en push de tag vX.Y.Z
#   - ghcr.io/<owner>/inmobiliaria-api:latest     en tag (no en main)

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

# Cancelar builds viejos cuando llega un push nuevo a la misma ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            dockerfile: apps/api/Dockerfile
            image: inmobiliaria-api
          - app: web
            dockerfile: apps/web/Dockerfile
            image: inmobiliaria-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      # Build args solo para web — los NEXT_PUBLIC_* se inlinean en el bundle.
      # Si tu dominio difiere, sobrescribilo agregando vars al repo.
      - name: Compute build-args (web)
        id: webargs
        if: matrix.app == 'web'
        run: |
          {
            echo "args<<EOF"
            echo "NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3001/api' }}"
            echo "NEXT_PUBLIC_ROOT_DOMAIN=${{ vars.NEXT_PUBLIC_ROOT_DOMAIN || 'localhost:3000' }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache de layers compartido entre runs vía GitHub Actions cache.
          # `mode=max` cachea también los stages intermedios (deps/build),
          # no solo el final → cache hits >90% en cambios incrementales.
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          provenance: false
          build-args: ${{ matrix.app == 'web' && steps.webargs.outputs.args || '' }}
